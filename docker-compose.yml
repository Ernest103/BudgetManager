version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: express_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: ${PORT}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      CLIENT_ORIGINS: ${CLIENT_ORIGINS}
    depends_on:
      - db
    networks:
      - app_network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: react_client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - app_network

  db:
    image: postgres:15
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  adminer:
    image: adminer
    container_name: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
